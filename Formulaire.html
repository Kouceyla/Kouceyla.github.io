<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Formulaire</title>
</head>
<body>
<form method="get" action="Formulaire.html">
    <p>Nom de famille</p>
    <input type="text" placeholder="Nom de famille">

    <p>Prénom</p>
    <input type="text" placeholder="Votre prénom">

    <p>Date de naissance</p>
    <input type="date" placeholder="">

    <p>Nombre d'enfants <input type ="text" placeholder=""> </p>

    <p>Votre couleur préférée <select name="select">
        <option>Jaune</option>
        <option>orange</option>
        <option>Vert</option> </p>
    </select>

    <p>Vos goûts musicaux</p>
    <input type="checkbox" name="Type de musique[]">Rock <br>
    <input type="checkbox" name="Type de musique[]">Rap <br>
    <input type="checkbox" name="Type de musique[]">Jazz <br>
    <input type="checkbox" name="Type de musique[]">Classique <br>

    <p>Votre taille</p>
    <input name="curseur" type="range">
    <div style ="margin-top: -2px">
        <span style="margin-right: 25px">S</span>
        <span style="margin-right: 25px">M</span>
        <span style="margin-right: 25px">L</span>
        <span style="margin-right: 25px">XL</span>
    </div>
    <input type="submit" value="Valider">


</form>

</body>
</html>
